<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">News Feed System High Level Architecture</title>
  <desc id="desc">A high level architecture diagram for a news feed system showing the publishing, graph, feed serving, and analytics planes and the data flow between them.</desc>

  <defs>
    <style>
      .bg { fill: #f8f5ef; }
      .plane-title { font: 700 20px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #17324d; }
      .label { font: 600 16px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #17324d; }
      .small { font: 500 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #37516b; }
      .box { rx: 16; ry: 16; stroke-width: 2; }
      .user { fill: #fff4d6; stroke: #d1a12d; }
      .edge { fill: #eef5ff; stroke: #4c78a8; }
      .publish { fill: #eaf8ef; stroke: #4d8c5a; }
      .rank { fill: #fff0ea; stroke: #cf6f45; }
      .data { fill: #f4f0ff; stroke: #7b68b3; }
      .plane { fill: #ffffff; stroke: #d7e0ea; stroke-width: 2; }
      .arrow { stroke: #4b5f73; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #7c8ea1; stroke-width: 2; fill: none; marker-end: url(#arrowhead-soft); stroke-dasharray: 8 7; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#4b5f73"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7c8ea1"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <rect class="plane" x="40" y="40" width="230" height="820"/>
  <text class="plane-title" x="60" y="78">Client and Edge</text>

  <rect class="box user" x="65" y="120" width="180" height="88"/>
  <text class="label" x="155" y="156" text-anchor="middle">User Client</text>
  <text class="small" x="155" y="178" text-anchor="middle">Create posts</text>
  <text class="small" x="155" y="196" text-anchor="middle">Read feed and send events</text>

  <rect class="box edge" x="65" y="260" width="180" height="88"/>
  <text class="label" x="155" y="296" text-anchor="middle">API Gateway</text>
  <text class="small" x="155" y="318" text-anchor="middle">Auth, routing, limits</text>
  <text class="small" x="155" y="336" text-anchor="middle">Observability hooks</text>

  <rect class="plane" x="310" y="40" width="320" height="820"/>
  <text class="plane-title" x="330" y="78">Publishing and Graph Plane</text>

  <rect class="box publish" x="340" y="120" width="260" height="88"/>
  <text class="label" x="470" y="156" text-anchor="middle">Post Service</text>
  <text class="small" x="470" y="178" text-anchor="middle">Validate and persist post writes</text>
  <text class="small" x="470" y="196" text-anchor="middle">Emit post-created events</text>

  <rect class="box data" x="340" y="250" width="260" height="88"/>
  <text class="label" x="470" y="286" text-anchor="middle">Post Store</text>
  <text class="small" x="470" y="308" text-anchor="middle">Durable post metadata</text>
  <text class="small" x="470" y="326" text-anchor="middle">Visibility and moderation state</text>

  <rect class="box edge" x="340" y="390" width="260" height="88"/>
  <text class="label" x="470" y="426" text-anchor="middle">Graph Service</text>
  <text class="small" x="470" y="448" text-anchor="middle">Follow and privacy lookups</text>
  <text class="small" x="470" y="466" text-anchor="middle">Forward and reverse graph queries</text>

  <rect class="box data" x="340" y="520" width="260" height="88"/>
  <text class="label" x="470" y="556" text-anchor="middle">Follow Graph Store</text>
  <text class="small" x="470" y="578" text-anchor="middle">Adjacency data for viewers</text>
  <text class="small" x="470" y="596" text-anchor="middle">Reverse follower index for authors</text>

  <rect class="box publish" x="340" y="650" width="260" height="88"/>
  <text class="label" x="470" y="686" text-anchor="middle">Post Publish Stream</text>
  <text class="small" x="470" y="708" text-anchor="middle">Durable async fan-out boundary</text>
  <text class="small" x="470" y="726" text-anchor="middle">Replay and recovery support</text>

  <rect class="plane" x="670" y="40" width="350" height="820"/>
  <text class="plane-title" x="690" y="78">Feed Serving and Ranking Plane</text>

  <rect class="box publish" x="700" y="120" width="290" height="88"/>
  <text class="label" x="845" y="156" text-anchor="middle">Fan-out Workers</text>
  <text class="small" x="845" y="178" text-anchor="middle">Expand follower lists for normal authors</text>
  <text class="small" x="845" y="196" text-anchor="middle">Write per-user feed candidates</text>

  <rect class="box publish" x="700" y="250" width="290" height="88"/>
  <text class="label" x="845" y="286" text-anchor="middle">Candidate Builder</text>
  <text class="small" x="845" y="308" text-anchor="middle">Merge hot-author and graph candidates</text>
  <text class="small" x="845" y="326" text-anchor="middle">Attach lightweight features</text>

  <rect class="box data" x="700" y="380" width="290" height="88"/>
  <text class="label" x="845" y="416" text-anchor="middle">Feed Edge Store</text>
  <text class="small" x="845" y="438" text-anchor="middle">Precomputed candidate storage</text>
  <text class="small" x="845" y="456" text-anchor="middle">Fast read and pagination access</text>

  <rect class="box edge" x="700" y="510" width="290" height="88"/>
  <text class="label" x="845" y="546" text-anchor="middle">Feed Cache</text>
  <text class="small" x="845" y="568" text-anchor="middle">Accelerate feed head reads</text>
  <text class="small" x="845" y="586" text-anchor="middle">Short-lived personalized slices</text>

  <rect class="box edge" x="700" y="640" width="290" height="88"/>
  <text class="label" x="845" y="676" text-anchor="middle">Feed Service</text>
  <text class="small" x="845" y="698" text-anchor="middle">Assemble feed pages and cursors</text>
  <text class="small" x="845" y="716" text-anchor="middle">Apply final visibility checks</text>

  <rect class="box rank" x="700" y="770" width="290" height="64"/>
  <text class="label" x="845" y="804" text-anchor="middle">Ranking Service</text>
  <text class="small" x="845" y="824" text-anchor="middle">Score bounded candidates under latency budget</text>

  <rect class="plane" x="1060" y="40" width="300" height="820"/>
  <text class="plane-title" x="1080" y="78">Analytics and Feature Plane</text>

  <rect class="box edge" x="1090" y="120" width="240" height="88"/>
  <text class="label" x="1210" y="156" text-anchor="middle">Event Ingestion</text>
  <text class="small" x="1210" y="178" text-anchor="middle">Receive impressions and engagement</text>
  <text class="small" x="1210" y="196" text-anchor="middle">High-throughput async intake</text>

  <rect class="box publish" x="1090" y="260" width="240" height="88"/>
  <text class="label" x="1210" y="296" text-anchor="middle">Engagement Stream</text>
  <text class="small" x="1210" y="318" text-anchor="middle">Event pipeline for updates and replay</text>
  <text class="small" x="1210" y="336" text-anchor="middle">Decouples analytics from reads</text>

  <rect class="box data" x="1090" y="400" width="240" height="88"/>
  <text class="label" x="1210" y="436" text-anchor="middle">Feature Store</text>
  <text class="small" x="1210" y="458" text-anchor="middle">Low-latency ranking features</text>
  <text class="small" x="1210" y="476" text-anchor="middle">Viewer, author, and post signals</text>

  <rect class="box data" x="1090" y="540" width="240" height="88"/>
  <text class="label" x="1210" y="576" text-anchor="middle">Analytics Store</text>
  <text class="small" x="1210" y="598" text-anchor="middle">Dashboards, aggregates, experiments</text>
  <text class="small" x="1210" y="616" text-anchor="middle">Offline analysis, not on read path</text>

  <path class="arrow" d="M155 208 L155 260"/>
  <path class="arrow" d="M245 304 L340 164"/>
  <path class="arrow" d="M245 304 L340 434"/>
  <path class="arrow" d="M245 304 L1090 164"/>

  <path class="arrow" d="M470 208 L470 250"/>
  <path class="arrow" d="M470 338 L470 650"/>
  <path class="arrow" d="M470 478 L470 520"/>
  <path class="arrow" d="M600 564 L700 164"/>
  <path class="arrow" d="M600 564 L700 294"/>
  <path class="arrow" d="M600 294 L700 294"/>
  <path class="arrow" d="M600 694 L700 164"/>
  <path class="arrow" d="M600 694 L700 294"/>

  <path class="arrow" d="M845 208 L845 250"/>
  <path class="arrow" d="M845 338 L845 380"/>
  <path class="arrow" d="M845 468 L845 510"/>
  <path class="arrow" d="M845 598 L845 640"/>
  <path class="arrow" d="M845 728 L845 770"/>
  <path class="arrow" d="M990 802 L1090 444"/>
  <path class="arrow-soft" d="M990 792 L600 292"/>

  <path class="arrow" d="M1210 208 L1210 260"/>
  <path class="arrow" d="M1210 348 L1210 400"/>
  <path class="arrow" d="M1210 348 L1210 540"/>

  <text class="small" x="1010" y="784">feature lookups</text>
  <text class="small" x="620" y="274">post metadata</text>
  <text class="small" x="635" y="674">publish events</text>
</svg>
