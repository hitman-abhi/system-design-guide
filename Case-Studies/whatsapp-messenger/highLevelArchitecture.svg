<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="920" viewBox="0 0 1520 920" role="img" aria-labelledby="title desc">
  <title id="title">WhatsApp Messenger High Level Architecture</title>
  <desc id="desc">High level architecture for a messaging system showing clients, edge and realtime gateways, message services, durable stores, delivery stream, fan-out workers, sync path, and push notifications.</desc>
  <defs>
    <style>
      .bg { fill: #f8f5ef; }
      .plane { fill: #ffffff; stroke: #d7e0ea; stroke-width: 2; rx: 20; ry: 20; }
      .box { stroke-width: 2; rx: 16; ry: 16; }
      .title { font: 700 20px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #17324d; }
      .label { font: 600 16px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #17324d; }
      .small { font: 500 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #37516b; }
      .edge { fill: #eef5ff; stroke: #4c78a8; }
      .core { fill: #eaf8ef; stroke: #4d8c5a; }
      .delivery { fill: #fff0ea; stroke: #cf6f45; }
      .data { fill: #f4f0ff; stroke: #7b68b3; }
      .arrow { stroke: #4b5f73; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#4b5f73"/>
    </marker>
  </defs>

  <rect class="bg" width="1520" height="920"/>

  <rect class="plane" x="40" y="50" width="250" height="800"/>
  <text class="title" x="60" y="86">Client and Connection Edge</text>
  <rect class="box edge" x="70" y="130" width="190" height="90"/>
  <text class="label" x="165" y="166" text-anchor="middle">Mobile and Web Clients</text>
  <text class="small" x="165" y="188" text-anchor="middle">Send messages, sync history</text>

  <rect class="box edge" x="70" y="280" width="190" height="90"/>
  <text class="label" x="165" y="316" text-anchor="middle">DNS / Global Router</text>
  <text class="small" x="165" y="338" text-anchor="middle">Route to nearby region</text>

  <rect class="box edge" x="70" y="430" width="190" height="90"/>
  <text class="label" x="165" y="466" text-anchor="middle">Edge Load Balancer</text>
  <text class="small" x="165" y="488" text-anchor="middle">Split realtime and sync traffic</text>

  <rect class="box edge" x="70" y="580" width="190" height="90"/>
  <text class="label" x="165" y="616" text-anchor="middle">Realtime Gateway Fleet</text>
  <text class="small" x="165" y="638" text-anchor="middle">Persistent connections and routing</text>

  <rect class="plane" x="330" y="50" width="430" height="800"/>
  <text class="title" x="350" y="86">Messaging Core</text>

  <rect class="box edge" x="360" y="130" width="170" height="90"/>
  <text class="label" x="445" y="166" text-anchor="middle">Auth Validation</text>
  <text class="small" x="445" y="188" text-anchor="middle">Session and token checks</text>

  <rect class="box data" x="560" y="130" width="170" height="90"/>
  <text class="label" x="645" y="166" text-anchor="middle">Session Directory</text>
  <text class="small" x="645" y="188" text-anchor="middle">Map connected users to gateways</text>

  <rect class="box edge" x="360" y="280" width="170" height="90"/>
  <text class="label" x="445" y="316" text-anchor="middle">Hot Metadata Cache</text>
  <text class="small" x="445" y="338" text-anchor="middle">Fast conversation lookups</text>

  <rect class="box core" x="560" y="280" width="170" height="90"/>
  <text class="label" x="645" y="316" text-anchor="middle">Message Write Service</text>
  <text class="small" x="645" y="338" text-anchor="middle">Persist, dedupe, sequence assign</text>

  <rect class="box core" x="360" y="430" width="170" height="90"/>
  <text class="label" x="445" y="466" text-anchor="middle">Conversation Service</text>
  <text class="small" x="445" y="488" text-anchor="middle">Conversation auth and metadata</text>

  <rect class="box core" x="560" y="430" width="170" height="90"/>
  <text class="label" x="645" y="466" text-anchor="middle">Group Service</text>
  <text class="small" x="645" y="488" text-anchor="middle">Membership and group fan-out rules</text>

  <rect class="box core" x="360" y="580" width="170" height="90"/>
  <text class="label" x="445" y="616" text-anchor="middle">Read State Service</text>
  <text class="small" x="445" y="638" text-anchor="middle">Advance delivered and read cursors</text>

  <rect class="box edge" x="560" y="580" width="170" height="90"/>
  <text class="label" x="645" y="616" text-anchor="middle">Sync Service</text>
  <text class="small" x="645" y="638" text-anchor="middle">Offline recovery and history fetch</text>

  <rect class="box data" x="460" y="730" width="170" height="90"/>
  <text class="label" x="545" y="766" text-anchor="middle">Message Store</text>
  <text class="small" x="545" y="788" text-anchor="middle">Durable history and sequence state</text>

  <rect class="plane" x="800" y="50" width="320" height="800"/>
  <text class="title" x="820" y="86">Delivery Plane</text>
  <rect class="box data" x="840" y="180" width="240" height="90"/>
  <text class="label" x="960" y="216" text-anchor="middle">Delivery Stream</text>
  <text class="small" x="960" y="238" text-anchor="middle">Async boundary after durable write</text>
  <text class="small" x="960" y="256" text-anchor="middle">Retryable delivery work</text>

  <rect class="box delivery" x="840" y="360" width="240" height="90"/>
  <text class="label" x="960" y="396" text-anchor="middle">Fan-out Workers</text>
  <text class="small" x="960" y="418" text-anchor="middle">Resolve recipients and route delivery</text>
  <text class="small" x="960" y="436" text-anchor="middle">Handle online and offline cases</text>

  <rect class="box delivery" x="840" y="540" width="240" height="90"/>
  <text class="label" x="960" y="576" text-anchor="middle">Push Notification Service</text>
  <text class="small" x="960" y="598" text-anchor="middle">Notify offline devices</text>
  <text class="small" x="960" y="616" text-anchor="middle">Not source of message truth</text>

  <rect class="plane" x="1160" y="50" width="320" height="800"/>
  <text class="title" x="1180" y="86">Recipient Delivery</text>
  <rect class="box edge" x="1200" y="220" width="240" height="90"/>
  <text class="label" x="1320" y="256" text-anchor="middle">Gateway Delivery</text>
  <text class="small" x="1320" y="278" text-anchor="middle">Deliver to connected sessions</text>

  <rect class="box edge" x="1200" y="400" width="240" height="90"/>
  <text class="label" x="1320" y="436" text-anchor="middle">APNS / FCM</text>
  <text class="small" x="1320" y="458" text-anchor="middle">Wake offline clients for sync</text>

  <rect class="box edge" x="1200" y="580" width="240" height="90"/>
  <text class="label" x="1320" y="616" text-anchor="middle">Recipient Client</text>
  <text class="small" x="1320" y="638" text-anchor="middle">Receive live message or sync later</text>

  <path class="arrow" d="M165 220 L165 280"/>
  <path class="arrow" d="M165 370 L165 430"/>
  <path class="arrow" d="M165 520 L165 580"/>

  <path class="arrow" d="M260 625 L360 175"/>
  <path class="arrow" d="M260 625 L560 175"/>
  <path class="arrow" d="M260 625 L445 325"/>
  <path class="arrow" d="M260 625 L645 325"/>
  <path class="arrow" d="M260 625 L445 625"/>
  <path class="arrow" d="M260 475 L645 625"/>

  <path class="arrow" d="M530 475 L560 475"/>
  <path class="arrow" d="M645 370 L545 730"/>
  <path class="arrow" d="M530 475 L545 730"/>
  <path class="arrow" d="M445 670 L545 730"/>
  <path class="arrow" d="M645 670 L545 730"/>
  <path class="arrow" d="M730 325 L840 225"/>
  <path class="arrow" d="M530 625 L840 225"/>

  <path class="arrow" d="M1080 225 L1200 265"/>
  <path class="arrow" d="M1080 405 L1200 265"/>
  <path class="arrow" d="M1080 585 L1200 445"/>
  <path class="arrow" d="M1440 445 L1320 580"/>
  <path class="arrow" d="M1440 265 L1320 580"/>

  <text class="small" x="850" y="730">Sender ack happens after durable persistence and stream publish.</text>
  <text class="small" x="850" y="750">Live delivery and push are downstream concerns.</text>
</svg>
