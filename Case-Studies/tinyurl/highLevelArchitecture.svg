<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">TinyURL High Level Architecture</title>
  <desc id="desc">Clean TinyURL architecture showing client, edge, create path, redirect path, shared mapping store, cache, and asynchronous analytics.</desc>
  <defs>
    <style>
      .bg { fill: #f8f5ef; }
      .box { stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 18px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #17324d; }
      .label { font: 600 14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #17324d; }
      .small { font: 500 11px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill: #37516b; }
      .edge { fill: #eef5ff; stroke: #4c78a8; }
      .create { fill: #eaf8ef; stroke: #4d8c5a; }
      .read { fill: #fff0ea; stroke: #cf6f45; }
      .data { fill: #f4f0ff; stroke: #7b68b3; }
      .arrow { stroke: #4b5f73; stroke-width: 2.25; fill: none; marker-end: url(#arrowhead); }
      .muted { stroke: #7c8ea1; stroke-width: 2; fill: none; marker-end: url(#arrowhead-soft); stroke-dasharray: 7 6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#4b5f73"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7c8ea1"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="430"/>
  <text class="title" x="32" y="36">TinyURL High-Level Architecture</text>

  <rect class="box edge" x="36" y="86" width="126" height="68"/>
  <text class="label" x="99" y="116" text-anchor="middle">Client / Browser</text>
  <text class="small" x="99" y="136" text-anchor="middle">Create or resolve short URLs</text>

  <rect class="box edge" x="36" y="206" width="126" height="68"/>
  <text class="label" x="99" y="236" text-anchor="middle">DNS / Edge</text>
  <text class="small" x="99" y="256" text-anchor="middle">Global ingress and routing</text>

  <rect class="box edge" x="210" y="146" width="132" height="68"/>
  <text class="label" x="276" y="176" text-anchor="middle">Load Balancer</text>
  <text class="small" x="276" y="196" text-anchor="middle">Split create and redirect traffic</text>

  <rect class="box create" x="394" y="64" width="156" height="78"/>
  <text class="label" x="472" y="96" text-anchor="middle">Link Management API</text>
  <text class="small" x="472" y="116" text-anchor="middle">Validate input and persist mappings</text>

  <rect class="box create" x="602" y="64" width="156" height="78"/>
  <text class="label" x="680" y="96" text-anchor="middle">Short-Code Generation</text>
  <text class="small" x="680" y="116" text-anchor="middle">Reserve unique aliases</text>

  <rect class="box read" x="394" y="214" width="156" height="78"/>
  <text class="label" x="472" y="246" text-anchor="middle">Redirect Service</text>
  <text class="small" x="472" y="266" text-anchor="middle">Resolve short code and return redirect</text>

  <rect class="box edge" x="602" y="214" width="156" height="78"/>
  <text class="label" x="680" y="246" text-anchor="middle">Redirect Cache</text>
  <text class="small" x="680" y="266" text-anchor="middle">Hot short-code lookups</text>

  <rect class="box data" x="602" y="334" width="156" height="78"/>
  <text class="label" x="680" y="366" text-anchor="middle">Link Mapping Store</text>
  <text class="small" x="680" y="386" text-anchor="middle">Authoritative URL and status data</text>

  <rect class="box edge" x="806" y="214" width="90" height="78"/>
  <text class="label" x="851" y="246" text-anchor="middle">Click Event</text>
  <text class="small" x="851" y="266" text-anchor="middle">Queue</text>

  <rect class="box create" x="806" y="64" width="90" height="78"/>
  <text class="label" x="851" y="96" text-anchor="middle">Analytics</text>
  <text class="small" x="851" y="116" text-anchor="middle">Workers</text>

  <rect class="box data" x="806" y="334" width="90" height="78"/>
  <text class="label" x="851" y="366" text-anchor="middle">Analytics</text>
  <text class="small" x="851" y="386" text-anchor="middle">Store</text>

  <path class="arrow" d="M99 154 L99 206"/>
  <path class="arrow" d="M162 240 L210 180"/>

  <path class="arrow" d="M342 170 L394 103"/>
  <path class="arrow" d="M342 190 L394 253"/>

  <path class="arrow" d="M550 103 L602 103"/>
  <path class="arrow" d="M472 142 L472 173 L680 173 L680 214"/>
  <path class="arrow" d="M472 142 L472 323 L680 323 L680 334"/>

  <path class="arrow" d="M550 253 L602 253"/>
  <path class="muted" d="M680 292 L680 334"/>
  <text class="small" x="690" y="316">cache miss</text>

  <path class="arrow" d="M758 253 L806 253"/>
  <path class="arrow" d="M851 214 L851 142"/>
  <path class="arrow" d="M851 292 L851 334"/>

  <text class="small" x="394" y="28">Create path</text>
  <text class="small" x="394" y="196">Redirect path</text>
  <text class="small" x="792" y="196">Async analytics</text>
</svg>
